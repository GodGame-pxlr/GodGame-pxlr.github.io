<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pierre Feuille Ciseaux</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background-color: #f2f2f2;
}

button{
    padding:10px;
    margin:5px;
    font-size:18px;
}

img{
    width:120px;
    display:none;
}

#resultat{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Jeu Pierre Feuille Ciseaux</h1>

<button onclick="jouer('pierre')">Pierre</button>
<button onclick="jouer('feuille')">Feuille</button>
<button onclick="jouer('ciseaux')">Ciseaux</button>

<br><br>

<img id="pierre" src="caillou.png">
<img id="feuille" src="papier.png">
<img id="ciseaux" src="ciseaux.png">

<div id="resultat"></div>

<script>

// fonction qui lance une partie
function jouer(choixJoueur){

    // cacher toutes les images
    document.getElementById("pierre").style.display = "none";
    document.getElementById("feuille").style.display = "none";
    document.getElementById("ciseaux").style.display = "none";

    // afficher l'image choisie
    document.getElementById(choixJoueur).style.display = "block";

    // choix possible pour l'ordi
    var choix = ["pierre","feuille","ciseaux"];

    // nombre aléatoire
    var nombre = Math.floor(Math.random()*3);

    // choix de l'ordinateur
    var choixOrdi = choix[nombre];

    var resultat = "";

    // comparaison
    if(choixJoueur == choixOrdi){
        resultat = "Egalité";
    }
    else if(choixJoueur == "pierre" && choixOrdi == "ciseaux"){
        resultat = "Tu as gagné !";
    }
    else if(choixJoueur == "feuille" && choixOrdi == "pierre"){
        resultat = "Tu as gagné !";
    }
    else if(choixJoueur == "ciseaux" && choixOrdi == "feuille"){
        resultat = "Tu as gagné !";
    }
    else{
        resultat = "Tu as perdu";
    }

    // afficher le résultat
    document.getElementById("resultat").innerHTML =
    "Tu as choisi : " + choixJoueur +
    "<br>L'ordinateur a choisi : " + choixOrdi +
    "<br>" + resultat;
}

</script>

</body>
</html>
